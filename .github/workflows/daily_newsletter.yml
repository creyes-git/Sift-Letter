name: Daily Finance Newsletter

on:
  schedule:
    # Runs at 7:00 AM Eastern Time (Miami) = 11:00 UTC (EDT, UTC-4, Mar–Nov)
    # In winter (EST, UTC-5, Nov–Mar), change to '0 12 * * *' for 7 AM
    - cron: '0 11 * * *'
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  run-newsletter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --frozen

      - name: Install Playwright Chromium
        run: uv run playwright install chromium

      # Restore history.json from cache to prevent duplicate articles across days
      - name: Restore history cache
        uses: actions/cache@v4
        with:
          path: history.json
          key: history-${{ github.run_id }}
          restore-keys: |
            history-

      - name: Run Pipeline
        env:
          # ── Non-sensitive configuration (GitHub Repository Variables) ────────
          NEWS_SOURCES: ${{ vars.NEWS_SOURCES }}
          INVESTMENT_FOCUS: ${{ vars.INVESTMENT_FOCUS }}
          SUBSCRIBER_EMAIL: ${{ vars.SUBSCRIBER_EMAIL }}
          # Set to: gemini | claude | openai | groq  (default: gemini)
          AI_PROVIDER: ${{ vars.AI_PROVIDER }}

          # ── API Keys (GitHub Repository Secrets) ─────────────────────────────
          # Only the key for your chosen AI_PROVIDER is required.
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: uv run python main.py
